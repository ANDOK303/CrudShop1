<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users - CRUD Shop</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        /* --- CURSORES DEFAULT --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh; overflow: hidden;
            background-color: #001a33; color: white;
            cursor: default; /* Cursor estándar */
        }

        a, button, .clickable {
            cursor: pointer; /* Mano estándar */
        }

        /* --- PANTALLA DE CARGA --- */
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #002147; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000;
            transition: opacity 1s ease-out, visibility 1s ease-out;
        }
        #loading-screen.fade-out { opacity: 0; visibility: hidden; }

        /* --- CONTENIDO --- */
        #main-content {
            width: 100%; height: 100%; display: none; opacity: 0;
            transform: translateY(20px); transition: 1s; padding: 40px;
        }
        #main-content.visible { display: block; opacity: 1; overflow-y: auto; }

        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 20px; margin-bottom: 50px; }
        .header-logo { width: 160px; }
        .btn-header { color: white; text-decoration: none; font-weight: bold; background: rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 5px; }

        .table-container {
            max-width: 1100px; margin: 0 auto;
            background: rgba(255, 255, 255, 0.05); border-radius: 15px; padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        table { width: 100%; border-collapse: collapse; color: white; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); }
        th { color: #ff9933; }

        .btn-action { padding: 8px 15px; border-radius: 5px; text-decoration: none; color: white; font-weight: bold; font-size: 0.9rem; }
        .btn-edit { background-color: #28a745; }
        .btn-delete { background-color: #dc3545; }
        .btn-create { background-color: #007bff; margin-bottom: 20px; display: inline-block; }

        /* --- WIDGET --- */
        #system-widget {
            position: fixed; bottom: 25px; left: 25px;
            background: rgba(0, 33, 71, 0.6); backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 255, 255, 0.1);
            padding: 15px 20px; border-radius: 20px;
            font-family: 'Courier New', monospace; font-size: 0.95rem; color: #b3d4ff;
        }
        .highlight { color: #ff9933; font-weight: bold; }
    </style>
</head>
<body>

<div id="loading-screen">
    <img th:src="@{/logito.png}" src="/logito.png" class="welcome-logo">
</div>

<div id="main-content">
    <header>
        <a href="/home" class="clickable"><img th:src="@{/logito.png}" src="/logito.png" class="header-logo"></a>
        <div>
            <a href="/home" class="btn-header">Volver al Home</a>
            <a href="/logout" class="btn-header">Cerrar Sesión</a>
        </div>
    </header>

    <h1 style="text-align: center; font-size: 2.5rem; margin-bottom: 30px;">Gestión de Usuarios</h1>

    <div class="table-container">
        <div style="text-align: right;">
            <a th:href="@{/user/new}" class="btn-action btn-create clickable">+ Nuevo Usuario</a>
        </div>
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Apellido</th>
                <th>Edad</th>
                <th>Email</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="user : ${users}">
                <td th:text="${user.userId}">1</td>
                <td th:text="${user.firstName}">Juan</td>
                <td th:text="${user.lastName}">Perez</td>
                <td th:text="${user.age}">25</td>
                <td th:text="${user.email}">juan.perez@mail.com</td>
                <td>
                    <a th:href="@{/user/edit/{id}(id=${user.userId})}" class="btn-action btn-edit clickable">Editar</a>
                    <a th:href="@{/user/delete/{id}(id=${user.userId})}" class="btn-action btn-delete clickable">Eliminar</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<div id="system-widget">
    <div>Posición: <span id="cursor-x" class="highlight">0</span>x, <span id="cursor-y" class="highlight">0</span>y</div>
    <div>Client RAM: <span id="ram-usage" class="highlight">Calculando...</span></div>
</div>

<script>
    window.addEventListener('load', () => {
        setTimeout(() => {
            document.getElementById('loading-screen').classList.add('fade-out');
            setTimeout(() => {
                const main = document.getElementById('main-content');
                main.style.display = 'block';
                setTimeout(() => main.classList.add('visible'), 50);
            }, 1000);
        }, 1500);

        document.addEventListener('mousemove', (e) => {
            document.getElementById('cursor-x').textContent = e.clientX;
            document.getElementById('cursor-y').textContent = e.clientY;
        });

        setInterval(() => {
            if (performance && performance.memory) {
                const usedJSHeap = (performance.memory.usedJSHeapSize / (1024 * 1024)).toFixed(1);
                document.getElementById('ram-usage').textContent = `${usedJSHeap} MB`;
            }
        }, 1000);
    });
</script>
</body>
</html>
