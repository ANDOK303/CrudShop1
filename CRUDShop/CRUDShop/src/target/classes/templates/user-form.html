<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Usuario</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh; background-color: #001a33; color: white;
            display: flex; justify-content: center; align-items: center;
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="white" stroke="%23ff9933" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 3 21 11 13 13 11 21 3 3"></polygon></svg>'), auto;
        }

        a, button, input[type="submit"] {
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="white" stroke="%23ff9933" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 8V6a2 2 0 0 0-4 0v8"></path><path d="M10 14H6a2 2 0 0 0-2 2v2a6 6 0 0 0 6 6h4a6 6 0 0 0 6-6v-5a2 2 0 0 0-2-2h-2"></path><path d="M18 13v-2a2 2 0 0 0-4 0v2"></path><path d="M14 11V9a2 2 0 0 0-4 0v2"></path></svg>') 10 0, pointer;
        }

        .form-container {
            background: rgba(0, 33, 71, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.1);
            padding: 40px; border-radius: 20px;
            width: 100%; max-width: 500px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            animation: fadeInDown 0.8s ease-out;
        }

        .form-title { text-align: center; margin-bottom: 30px; font-size: 2rem; color: #ff9933; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; }

        .form-control {
            width: 100%; padding: 12px;
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px; color: white; font-size: 1rem;
            outline: none; transition: border-color 0.3s;
        }
        .form-control:focus { border-color: #ff9933; background: rgba(255,255,255,0.15); }

        .btn-submit {
            width: 100%; padding: 15px; background-color: #ff9933;
            color: #001a33; border: none; border-radius: 8px;
            font-size: 1.1rem; font-weight: bold; margin-top: 10px;
            transition: transform 0.2s, background-color 0.2s;
        }
        .btn-submit:hover { background-color: #ffaa44; transform: translateY(-3px); }

        .btn-cancel {
            display: block; text-align: center; margin-top: 15px;
            color: #b3d4ff; text-decoration: none; transition: color 0.3s;
        }
        .btn-cancel:hover { color: white; }

        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="form-container">
    <h2 class="form-title" th:text="${user.userId != null} ? 'Editar Usuario' : 'Nuevo Usuario'">Formulario</h2>

    <form th:action="@{/users/save}" th:object="${user}" method="post">
        <input type="hidden" th:field="*{userId}" />

        <div class="form-group">
            <label for="firstName">Nombre:</label>
            <input type="text" id="firstName" th:field="*{firstName}" class="form-control" required />
        </div>

        <div class="form-group">
            <label for="lastName">Apellido:</label>
            <input type="text" id="lastName" th:field="*{lastName}" class="form-control" required />
        </div>

        <div class="form-group">
            <label for="age">Edad:</label>
            <input type="number" id="age" th:field="*{age}" class="form-control" required />
        </div>

        <div class="form-group">
            <label for="email">Correo Electrónico:</label>
            <input type="email" id="email" th:field="*{email}" class="form-control" required />
        </div>

        <button type="submit" class="btn-submit">Guardar</button>
        <a th:href="@{/users}" class="btn-cancel">Cancelar y regresar</a>
    </form>
</div>

</body>
</html>
