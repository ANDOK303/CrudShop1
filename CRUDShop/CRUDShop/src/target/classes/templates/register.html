<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Fundación Kinal</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-image: url('/kinal65.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-container {
            background-color: rgba(0, 33, 71, 0.96);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            border-top: 5px solid #ffffff;
            width: 320px;
            text-align: center;
            color: white;
            z-index: 10;
        }

        .login-logo {
            width: 100px;
            height: auto;
            margin-bottom: 20px;
        }

        h2 {
            color: #ffffff;
            margin-top: 0;
            font-size: 1.6rem;
            margin-bottom: 25px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            background-color: rgba(0, 15, 35, 0.6);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s ease;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        input:focus {
            background-color: rgba(0, 15, 35, 0.8);
            border-color: rgba(255, 255, 255, 0.3);
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 15px;
            background-color: #ffffff;
            color: #002147;
            transition: transform 0.2s, background 0.3s;
        }

        button:hover {
            background-color: #f0f0f0;
            transform: scale(1.02);
        }

        .btn-back {
            background-color: transparent;
            color: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.4);
            margin-top: 25px;
            padding: 8px;
            font-size: 0.8rem;
            text-decoration: none;
            display: inline-block;
            width: 85%;
            border-radius: 4px;
            transition: all 0.3s;
        }

        .btn-back:hover {
            background-color: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            border-color: #ffffff;
        }
    </style>
</head>
<body>

<div class="login-container">
    <img th:src="@{/kinal_logo.png}" alt="Logo Fundación Kinal" class="login-logo">

    <h2>Crea tu cuenta</h2>

    <form th:action="@{/register/save}" method="post">
        <input type="text" name="nombre" placeholder="Nombre completo" required>
        <input type="email" name="email" placeholder="Correo electrónico" required>
        <input type="text" name="username" placeholder="Usuario" required>
        <input type="password" name="password" placeholder="Contraseña" required>

        <button type="submit">Registrarse</button>
    </form>

    <a href="/login" class="btn-back">¿Ya tienes cuenta? Inicia sesión</a>
</div>

</body>
</html>
