<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - CRUD Shop</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        /* --- CURSORES DEFAULT --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh; overflow: hidden;
            background-color: #001a33; color: white;
            cursor: default;
        }

        a, button, .nav-card {
            cursor: pointer;
        }

        /* --- PANTALLA DE CARGA --- */
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #002147; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000;
            transition: opacity 1s ease-out, visibility 1s ease-out;
        }
        #loading-screen.fade-out { opacity: 0; visibility: hidden; }

        .welcome-logo { width: 300px; animation: fadeInDown 1s forwards 0.2s; opacity: 0; }
        .welcome-text { font-size: 3.5rem; font-weight: bold; margin-top: 20px; animation: fadeIn 1s forwards 0.6s; opacity: 0; }

        /* --- DASHBOARD --- */
        #main-content { width: 100%; height: 100%; display: none; padding: 40px; opacity: 0; transition: 1s; }
        #main-content.visible { display: block; opacity: 1; overflow-y: auto; }

        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 20px; margin-bottom: 50px; }
        .header-logo { width: 160px; }

        .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; max-width: 1200px; margin: 0 auto; }
        .nav-card {
            background-color: rgba(255, 255, 255, 0.95); color: #002147;
            padding: 40px; border-radius: 15px; text-decoration: none; text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); transition: 0.3s;
        }
        .nav-card:hover { transform: translateY(-10px); box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        .nav-card-title { font-size: 1.8rem; font-weight: bold; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="loading-screen">
    <img th:src="@{/logito.png}" src="/logito.png" class="welcome-logo">
    <h1 class="welcome-text">Bienvenido</h1>
</div>

<div id="main-content">
    <header>
        <img th:src="@{/logito.png}" src="/logito.png" class="header-logo">
        <a href="/logout" style="color: white; text-decoration: none; background: rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 5px;">Cerrar Sesión</a>
    </header>

    <h1 style="text-align: center; font-size: 2.8rem; margin-bottom: 45px;">Panel de Administración</h1>

    <div class="cards-grid">
        <a href="/categories" class="nav-card"><div class="nav-card-title">Categorías</div></a>
        <a href="/products" class="nav-card"><div class="nav-card-title">Productos</div></a>
        <a href="/orders" class="nav-card"><div class="nav-card-title">Pedidos</div></a>
        <a href="/order-details" class="nav-card"><div class="nav-card-title">Detalle Pedidos</div></a>
        <a href="/user" class="nav-card"><div class="nav-card-title">Usuarios</div></a>
    </div>
</div>

<script>
    window.addEventListener('load', () => {
        setTimeout(() => {
            document.getElementById('loading-screen').classList.add('fade-out');
            setTimeout(() => {
                const main = document.getElementById('main-content');
                main.style.display = 'block';
                setTimeout(() => main.classList.add('visible'), 50);
            }, 1000);
        }, 2500);
    });
</script>
</body>
</html>
